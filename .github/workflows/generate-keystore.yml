name: Generate Release Keystore

# One-time (or whenever you want to rotate keys) setup workflow.
# Generates a release keystore with random passwords and pushes
# KEYSTORE_BASE64 / STORE_PASSWORD / KEY_PASSWORD directly as repo
# secrets via the GitHub API. Nothing sensitive is printed or
# stored as a workflow artifact.
#
# Requires one bootstrap secret you create yourself first: GH_PAT
# (a Personal Access Token with permission to manage this repo's
# Actions secrets). See README for how to create it.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate keystore with random passwords
        run: |
          set -euo pipefail

          STORE_PASSWORD="$(openssl rand -base64 24)"
          KEY_PASSWORD="$STORE_PASSWORD"

          # Mask immediately so they never show up in logs even by accident.
          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          keytool -genkeypair -v \
            -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Jack Cable Tester, OU=, O=, L=, S=, C="

          KEYSTORE_BASE64="$(base64 -w0 my-upload-key.jks)"
          echo "::add-mask::$KEYSTORE_BASE64"

          echo "STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "KEYSTORE_BASE64=$KEYSTORE_BASE64" >> "$GITHUB_ENV"

          # Fingerprint is not sensitive — useful to confirm which key
          # signed a given APK later.
          echo "Certificate fingerprint (safe to share):"
          keytool -list -v -keystore my-upload-key.jks -storepass "$STORE_PASSWORD" \
            | grep -A1 "SHA256"

          rm -f my-upload-key.jks

      - name: Push secrets to this repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          gh secret set STORE_PASSWORD --body "$STORE_PASSWORD" --repo "${{ github.repository }}"
          gh secret set KEY_PASSWORD --body "$KEY_PASSWORD" --repo "${{ github.repository }}"
          gh secret set KEYSTORE_BASE64 --body "$KEYSTORE_BASE64" --repo "${{ github.repository }}"
          echo "Secrets STORE_PASSWORD, KEY_PASSWORD, and KEYSTORE_BASE64 have been set."
